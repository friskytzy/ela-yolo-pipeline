# ============================================================================
# ELA + YOLOv8 Pipeline Configuration
# ============================================================================
# Centralised knobs for the full experiment. Override any field via CLI args
# in scripts/run_pipeline.py (e.g. `--num-images 50`).
# ============================================================================

paths:
  dataset_root: dataset
  authentic_dir: dataset/authentic
  tampered_copy_move_dir: dataset/tampered/copy_move
  tampered_removal_dir:   dataset/tampered/removal
  ela_authentic_dir: dataset/ela/authentic
  ela_tampered_dir:  dataset/ela/tampered
  labels_dir: labels/yolo
  yolo_dataset_dir: dataset/yolo   # split into train/val with images & labels
  reports_dir: reports

# ----------------------------------------------------------------------------
# Roboflow Universe source
# ----------------------------------------------------------------------------
# The dataset MUST have YOLO-format bounding boxes so we can drive copy-move /
# removal with real object regions. Defaults are public Universe datasets.
# Override via env var ROBOFLOW_API_KEY.
roboflow:
  api_key_env: ROBOFLOW_API_KEY
  # Primary candidate: tries each in order until one succeeds.
  candidates:
    - workspace: roboflow-100
      project:   vehicles-q0x2v
      version:   2
      format:    yolov8
    - workspace: roboflow-jvuqo
      project:   people-detection-o4rdr
      version:   8
      format:    yolov8
    - workspace: jacob-solawetz
      project:   aerial-maritime
      version:   9
      format:    yolov8

# ----------------------------------------------------------------------------
# Dataset constraints
# ----------------------------------------------------------------------------
dataset:
  # Spec requested ≥1024x1024 authentic. In practice most Roboflow Universe
  # datasets are pre-resized to 640px during their preprocessing pipeline.
  # We set a soft minimum here; the curator falls back to the largest
  # available below threshold (with a logged warning) and NEVER upsizes
  # silently (which would break the "identical resolution" control).
  # Override this to 1024 if you swap in a higher-resolution dataset.
  min_resolution: 480
  jpeg_quality: 95          # authentic + tampered SAME quality (control)
  ela_recompress_quality: 90
  ela_scale: 12             # ×10..15; 12 is a balanced default
  # Pilot scale: keeps the run feasible on CPU.
  num_authentic: 100
  copy_move_per_image: 1    # number of copy-move ops per source image
  removal_per_image: 1
  random_seed: 42

# ----------------------------------------------------------------------------
# Tampering parameters
# ----------------------------------------------------------------------------
tamper:
  copy_move:
    # Gaussian blur kernel applied to the PASTED region edge (natural blend)
    blur_kernel: 3
    blur_sigma: 0.8
    # Minimum bbox area as fraction of image area (skip tiny boxes)
    min_bbox_area_frac: 0.01
    max_bbox_area_frac: 0.30
    # Randomised translation distance (fraction of image dim)
    min_shift_frac: 0.10
    max_shift_frac: 0.40
  removal:
    method: telea            # telea | ns (Navier-Stokes)
    inpaint_radius: 5
    # Slightly dilate the mask so inpainting covers the soft edges
    mask_dilate: 7
    min_bbox_area_frac: 0.01
    max_bbox_area_frac: 0.20

# ----------------------------------------------------------------------------
# YOLOv8 training
# ----------------------------------------------------------------------------
yolo:
  base_model: yolov8n.pt    # nano = fastest on CPU; switch to yolov8s/m if GPU
  epochs: 50
  imgsz: 640
  batch: 8
  val_split: 0.2
  patience: 15
  device: auto              # 'cpu', '0', or 'auto' (lets ultralytics pick)
  project: runs/ela_yolo
  name: train
